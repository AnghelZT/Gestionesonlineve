    <!-- LOGICA DE LA APLICACIÓN -->
    <script>
        // --- 1. CONFIGURACIÓN DE LA BASE DE DATOS LOCAL (DEXIE) ---
        const db = new Dexie("InterFinanzasDB");
        db.version(1).stores({
            usuarios: '++id, &username, role',
            transacciones: '++id, fecha, tipo, monto, moneda, descripcion, userId',
            compras: '++id, item, total, downpayment, totalInstallments, installments, status, userId',
            deudas: '++id, tipo, persona, concepto, montoTotal, montoPendiente, status, userId',
            configuracion: 'key, value'
        });

        // --- 2. VARIABLES DE ESTADO ---
        let currentUser = null;
        let bcvRate = 45.00; // Valor de respaldo inicial por si falla la conexión externa
        let currentTxType = 'ingreso';
        let currentDebtType = 'cobrar';

        // --- 3. ENCRIPTACIÓN DE CONTRASEÑA (SHA-256) ---
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // --- 4. INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            await checkSeedUsers();
            await fetchBCVRate();
            await checkSession();
            setupEventListeners();
        });

        // Seed de usuario por defecto
        async function checkSeedUsers() {
            const count = await db.usuarios.count();
            if (count === 0) {
                const adminHash = await hashPassword('admin123');
                await db.usuarios.add({
                    username: 'admin',
                    password: adminHash,
                    role: 'admin'
                });
            }
        }

        // Obtener la tasa del BCV (Actualizado para las 5pm y 7pm hora de Venezuela)
        async function fetchBCVRate(forced = false) {
            try {
                const storedRate = await db.configuracion.get('bcv_rate');
                const lastUpdated = await db.configuracion.get('bcv_last_updated');
                
                // Obtener hora actual en la zona horaria de Venezuela
                const now = new Date();
                const venzTime = new Intl.DateTimeFormat('en-US', {
                    timeZone: 'America/Caracas',
                    hour: 'numeric',
                    minute: 'numeric',
                    hour12: false
                }).formatToParts(now);

                const currentHour = parseInt(venzTime.find(p => p.type === 'hour').value);
                const currentMinute = parseInt(venzTime.find(p => p.type === 'minute').value);

                let needsUpdate = forced || !storedRate || !lastUpdated;

                if (!needsUpdate && lastUpdated) {
                    const lastUpdatedDate = new Date(parseInt(lastUpdated.value));
                    const lastUpdatedDay = lastUpdatedDate.toLocaleDateString('es-VE', { timeZone: 'America/Caracas' });
                    const todayDay = now.toLocaleDateString('es-VE', { timeZone: 'America/Caracas' });

                    // Ventana de las 5:00 PM (17:00 a 17:15)
                    if (currentHour === 17 && currentMinute <= 15) {
                        const lastUpdatedHour = lastUpdatedDate.getUTCHours() - 4; // Ajuste aproximado a Venz o evaluar por string
                        const lastString = lastUpdatedDate.toLocaleTimeString('es-VE', { timeZone: 'America/Caracas', hour: '2-digit', hour12: false });
                        if (lastUpdatedDay !== todayDay || parseInt(lastString) < 17) {
                            needsUpdate = true;
                        }
                    }
                    
                    // Ventana de las 7:00 PM (19:00 a 19:15)
                    if (currentHour === 19 && currentMinute <= 15) {
                        const lastString = lastUpdatedDate.toLocaleTimeString('es-VE', { timeZone: 'America/Caracas', hour: '2-digit', hour12: false });
                        if (lastUpdatedDay !== todayDay || parseInt(lastString) < 19) {
                            needsUpdate = true;
                        }
                    }
                }

                // Ejecución de la consulta API si expira o se requiere forzar
                if (needsUpdate) {
                    const response = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                    const data = await response.json();
                    if (data && data.promedio) {
                        bcvRate = parseFloat(data.promedio);
                        await db.configuracion.put({ key: 'bcv_rate', value: bcvRate });
                        await db.configuracion.put({ key: 'bcv_last_updated', value: Date.now().toString() });
                    }
                } else if (storedRate) {
                    bcvRate = parseFloat(storedRate.value);
                }
            } catch (err) {
                console.warn("Fallo al obtener tasa API. Usando tasa de respaldo o cache.", err);
                const fallback = await db.configuracion.get('bcv_rate');
                if (fallback) bcvRate = parseFloat(fallback.value);
            }
            document.getElementById('bcv-rate-display').innerText = `Bs ${bcvRate.toFixed(2)}`;
        }

        // Control de Sesión
        async function checkSession() {
            const session = localStorage.getItem('activeUserSession');
            if (session) {
                const user = JSON.parse(session);
                const dbUser = await db.usuarios.get({ username: user.username });
                if (dbUser) {
                    currentUser = dbUser;
                    showDashboard();
                    return;
                }
            }
            showAuth();
        }

        // Navegación Visual entre Pantallas
        function showAuth() {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('dashboard-section').classList.add('hidden');
            document.getElementById('user-profile-nav').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('user-profile-nav').classList.remove('hidden');
            document.getElementById('nav-username').innerText = currentUser.username;
            document.getElementById('nav-role').innerText = currentUser.role === 'admin' ? 'Administrador' : 'Gestor';
            
            if (currentUser.role === 'admin') {
                document.getElementById('tab-admin').classList.remove('hidden');
            } else {
                document.getElementById('tab-admin').classList.add('hidden');
            }

            switchTab('transacciones');
            updateBalancesAndDashboards();
        }

        // --- 5. NAVEGACIÓN POR PESTAÑAS (SPA) ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-indigo-500', 'text-indigo-400');
                b.classList.add('border-transparent', 'text-slate-400');
            });

            document.getElementById(`panel-${tabId}`).classList.remove('hidden');
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('border-transparent', 'text-slate-400');
            activeBtn.classList.add('border-indigo-500', 'text-indigo-400');
        }

        // --- 6. EVENT LISTENERS ---
        function setupEventListeners() {
            // Cambio entre Inicio de Sesión y Registro
            const authToggle = document.getElementById('toggle-auth-mode');
            authToggle.addEventListener('click', () => {
                const isLogin = document.getElementById('auth-title').innerText === 'Iniciar Sesión';
                document.getElementById('auth-title').innerText = isLogin ? 'Crear una Cuenta' : 'Iniciar Sesión';
                document.getElementById('auth-subtitle').innerText = isLogin ? 'Únete al sistema de control de caja' : 'Accede para gestionar tus finanzas';
                authToggle.innerText = isLogin ? '¿Ya tienes cuenta? Inicia sesión aquí' : '¿No tienes cuenta? Regístrate aquí';
            });

            // Manejador del Formulario de Autenticación
            document.getElementById('auth-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('auth-username').value.trim();
                const rawPassword = document.getElementById('auth-password').value;
                const hashedPassword = await hashPassword(rawPassword);
                const isLogin = document.getElementById('auth-title').innerText === 'Iniciar Sesión';

                if (isLogin) {
                    const matchedUser = await db.usuarios.get({ username: username, password: hashedPassword });
                    if (matchedUser) {
                        currentUser = matchedUser;
                        localStorage.setItem('activeUserSession', JSON.stringify({ username }));
                        document.getElementById('auth-form').reset();
                        showDashboard();
                    } else {
                        alert("Las credenciales introducidas no coinciden o no existen.");
                    }
                } else {
                    const existing = await db.usuarios.get({ username });
                    if (existing) {
                        alert("El nombre de usuario ya se encuentra registrado.");
                        return;
                    }
                    const newUser = { username, password: hashedPassword, role: 'user' };
                    await db.usuarios.add(newUser);
                    currentUser = await db.usuarios.get({ username });
                    localStorage.setItem('activeUserSession', JSON.stringify({ username }));
                    document.getElementById('auth-form').reset();
                    showDashboard();
                }
            });

            // Cierre de sesión
            document.getElementById('btn-logout').addEventListener('click', () => {
                currentUser = null;
                localStorage.removeItem('activeUserSession');
                showAuth();
            });

            // Conmutador de Tipo de Transacción
            document.getElementById('tx-type-ingreso').addEventListener('click', () => setTxType('ingreso'));
            document.getElementById('tx-type-egreso').addEventListener('click', () => setTxType('egreso'));

            // Envío de Transacción manual
            document.getElementById('tx-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const monto = parseFloat(document.getElementById('tx-monto').value);
                const moneda = document.getElementById('tx-moneda').value;
                const descripcion = document.getElementById('tx-descripcion').value.trim();

                await db.transacciones.add({
                    fecha: Date.now(),
                    tipo: currentTxType,
                    monto,
                    moneda,
                    descripcion,
                    userId: currentUser.id
                });

                document.getElementById('tx-form').reset();
                setTxType('ingreso');
                await updateBalancesAndDashboards();
            });

            // Conmutador de Tipo de Deuda / Cobro
            document.getElementById('debt-type-cobrar').addEventListener('click', () => setDebtType('cobrar'));
            document.getElementById('debt-type-pagar').addEventListener('click', () => setDebtType('pagar'));

            // Envío de Deuda manual
            document.getElementById('debt-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const persona = document.getElementById('debt-person').value.trim();
                const concepto = document.getElementById('debt-concept').value.trim();
                const monto = parseFloat(document.getElementById('debt-amount').value);

                await db.deudas.add({
                    tipo: currentDebtType,
                    persona,
                    concepto,
                    montoTotal: monto,
                    montoPendiente: monto,
                    status: 'pendiente',
                    userId: currentUser.id
                });

                document.getElementById('debt-form').reset();
                setDebtType('cobrar');
                await updateBalancesAndDashboards();
            });

            // Envío de Financiamiento (Cashea)
            document.getElementById('purchase-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const item = document.getElementById('pur-item').value.trim();
                const total = parseFloat(document.getElementById('pur-total').value);
                const downpayment = parseFloat(document.getElementById('pur-downpayment').value);
                const totalInstallments = parseInt(document.getElementById('pur-installments').value);

                if (downpayment >= total) {
                    alert("La cuota inicial no puede ser igual o mayor al costo total del artículo.");
                    return;
                }

                // Cálculo de las cuotas
                const remaining = total - downpayment;
                const installmentAmount = Math.round((remaining / totalInstallments) * 100) / 100;
                
                const installments = [];
                const now = Date.now();
                for (let i = 1; i <= totalInstallments; i++) {
                    installments.push({
                        installmentNumber: i,
                        dueDate: now + (i * 14 * 24 * 60 * 60 * 1000), // Cada 14 días
                        amount: installmentAmount,
                        status: 'pendiente',
                        paidAmount: 0
                    });
                }

                // Guardar la compra
                await db.compras.add({
                    item,
                    total,
                    downpayment,
                    totalInstallments,
                    installments,
                    status: 'pendiente',
                    userId: currentUser.id
                });

                // Registrar de forma automática la inicial como un egreso de Caja USD
                await db.transacciones.add({
                    fecha: now,
                    tipo: 'egreso',
                    monto: downpayment,
                    moneda: 'USD',
                    descripcion: `Inicial financiamiento: ${item}`,
                    userId: currentUser.id
                });

                document.getElementById('purchase-form').reset();
                await updateBalancesAndDashboards();
            });

            // Lógica de cálculo en vivo de conversión de moneda en el Modal
            const modalPayAmountInput = document.getElementById('modal-pay-amount');
            const modalPayMethodSelect = document.getElementById('modal-pay-method');
            const conversionNotice = document.getElementById('modal-conversion-notice');

            function updateModalConversionNotice() {
                const method = modalPayMethodSelect.value;
                const amount = parseFloat(modalPayAmountInput.value) || 0;
                if (method === 'VES') {
                    const equivalent = amount * bcvRate;
                    conversionNotice.innerText = `Equivalente en Bolívares a retirar de Caja: Bs ${equivalent.toLocaleString('es-VE', {minimumFractionDigits:2, maximumFractionDigits:2})} (Tasa BCV: ${bcvRate})`;
                    conversionNotice.classList.remove('hidden');
                } else {
                    conversionNotice.classList.add('hidden');
                }
            }

            modalPayAmountInput.addEventListener('input', updateModalConversionNotice);
            modalPayMethodSelect.addEventListener('change', updateModalConversionNotice);

            // Guardar Pago de Modal
            document.getElementById('modal-payment-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const targetType = document.getElementById('modal-target-type').value;
                const targetId = parseInt(document.getElementById('modal-target-id').value);
                const instIdx = parseInt(document.getElementById('modal-installment-idx').value);
                const payAmount = parseFloat(modalPayAmountInput.value);
                const payMethod = modalPayMethodSelect.value;

                if (targetType === 'cashea') {
                    const purchase = await db.compras.get(targetId);
                    if (purchase) {
                        const inst = purchase.installments[instIdx];
                        const remaining = inst.amount - inst.paidAmount;
                        
                        if (payAmount > remaining) {
                            alert("No puedes abonar un monto superior al saldo restante de esta cuota.");
                            return;
                        }

                        // Actualizar la cuota específica
                        inst.paidAmount += payAmount;
                        if (inst.paidAmount >= inst.amount) {
                            inst.status = 'pagado';
                        }
                        
                        // Validar estado global de la compra
                        const allPaid = purchase.installments.every(i => i.status === 'pagado');
                        purchase.status = allPaid ? 'pagado' : 'pendiente';
                        
                        await db.compras.put(purchase);

                        // Registrar transacción de egreso según el método de pago seleccionado
                        await db.transacciones.add({
                            fecha: Date.now(),
                            tipo: 'egreso',
                            monto: payMethod === 'VES' ? (payAmount * bcvRate) : payAmount,
                            moneda: payMethod,
                            descripcion: `Abono Cuota N°${inst.installmentNumber} de: ${purchase.item}`,
                            userId: currentUser.id
                        });
                    }
                } else if (targetType === 'deuda') {
                    const debt = await db.deudas.get(targetId);
                    if (debt) {
                        if (payAmount > debt.montoPendiente) {
                            alert("No puedes abonar más del saldo restante acumulado.");
                            return;
                        }

                        debt.montoPendiente -= payAmount;
                        if (debt.montoPendiente <= 0) {
                            debt.status = 'pagado';
                        }
                        await db.deudas.put(debt);

                        // Determinar tipo de flujo de caja según el tipo de la cuenta
                        const txType = debt.tipo === 'cobrar' ? 'ingreso' : 'egreso';
                        const descPrefix = debt.tipo === 'cobrar' ? 'Cobro recibido' : 'Pago realizado';

                        await db.transacciones.add({
                            fecha: Date.now(),
                            tipo: txType,
                            monto: payMethod === 'VES' ? (payAmount * bcvRate) : payAmount,
                            moneda: payMethod,
                            descripcion: `${descPrefix}: ${debt.concepto} (${debt.persona})`,
                            userId: currentUser.id
                        });
                    }
                }

                closePaymentModal();
                await updateBalancesAndDashboards();
            });

            // Filtro de historial transaccional
            document.getElementById('filter-tx-type').addEventListener('change', async () => {
                await renderTransacciones();
            });
        }

        // --- 7. CONTROLADORES DE INTERFAZ DE BOTONES ---
        function setTxType(type) {
            currentTxType = type;
            const btnIngreso = document.getElementById('tx-type-ingreso');
            const btnEgreso = document.getElementById('tx-type-egreso');

            if (type === 'ingreso') {
                btnIngreso.className = "tx-type-btn py-2.5 rounded-xl font-bold text-sm bg-indigo-600 text-white border-2 border-indigo-500 transition";
                btnEgreso.className = "tx-type-btn py-2.5 rounded-xl font-bold text-sm bg-slate-900 text-slate-400 border border-slate-700 hover:border-slate-600 transition";
            } else {
                btnIngreso.className = "tx-type-btn py-2.5 rounded-xl font-bold text-sm bg-slate-900 text-slate-400 border border-slate-700 hover:border-slate-600 transition";
                btnEgreso.className = "tx-type-btn py-2.5 rounded-xl font-bold text-sm bg-indigo-600 text-white border-2 border-indigo-500 transition";
            }
        }

        function setDebtType(type) {
            currentDebtType = type;
            const btnCobrar = document.getElementById('debt-type-cobrar');
            const btnPagar = document.getElementById('debt-type-pagar');

            if (type === 'cobrar') {
                btnCobrar.className = "debt-type-btn py-2.5 rounded-xl font-bold text-sm bg-indigo-600 text-white border-2 border-indigo-500 transition";
                btnPagar.className = "debt-type-btn py-2.5 rounded-xl font-bold text-sm bg-slate-900 text-slate-400 border border-slate-700 hover:border-slate-600 transition";
            } else {
                btnCobrar.className = "debt-type-btn py-2.5 rounded-xl font-bold text-sm bg-slate-900 text-slate-400 border border-slate-700 hover:border-slate-600 transition";
                btnPagar.className = "debt-type-btn py-2.5 rounded-xl font-bold text-sm bg-indigo-600 text-white border-2 border-indigo-500 transition";
            }
        }

        // --- 8. RENDERS Y CÁLCULOS FINANCIEROS EN VIVO ---
        async function updateBalancesAndDashboards() {
            if (!currentUser) return;

            // Obtener todas las transacciones vinculadas al usuario activo
            const txs = await db.transacciones.where('userId').equals(currentUser.id).toArray();
            
            let usdBalance = 0;
            let vesBalance = 0;

            txs.forEach(t => {
                const multiplier = t.tipo === 'ingreso' ? 1 : -1;
                if (t.moneda === 'USD') {
                    usdBalance += (t.monto * multiplier);
                } else if (t.moneda === 'VES') {
                    vesBalance += (t.monto * multiplier);
                }
            });

            // Actualizar interfaz principal de balance
            document.getElementById('balance-usd').innerText = `$${usdBalance.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('balance-ves').innerText = `Bs ${vesBalance.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            // Calcular cobros pendientes de Cuentas por Cobrar
            const receivables = await db.deudas.where({ userId: currentUser.id, tipo: 'cobrar', status: 'pendiente' }).toArray();
            const totalReceivables = receivables.reduce((sum, item) => sum + item.montoPendiente, 0);
            document.getElementById('pending-receivables').innerText = `$${totalReceivables.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            // Calcular deudas pendientes (Cashea + Cuentas por pagar)
            const payables = await db.deudas.where({ userId: currentUser.id, tipo: 'pagar', status: 'pendiente' }).toArray();
            const totalPayables = payables.reduce((sum, item) => sum + item.montoPendiente, 0);

            const purchases = await db.compras.where({ userId: currentUser.id, status: 'pendiente' }).toArray();
            let totalCasheaPending = 0;
            purchases.forEach(p => {
                p.installments.forEach(inst => {
                    if (inst.status === 'pendiente') {
                        totalCasheaPending += (inst.amount - inst.paidAmount);
                    }
                });
            });

            const totalDebtsGlobal = totalPayables + totalCasheaPending;
            document.getElementById('pending-payables').innerText = `$${totalDebtsGlobal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            // Renderizar vistas asociadas
            await renderTransacciones();
            await renderCompras();
            await renderDeudas();
            await renderAdminPanel();
            lucide.createIcons();
        }

        async function renderTransacciones() {
            const filter = document.getElementById('filter-tx-type').value;
            let txs = await db.transacciones.where('userId').equals(currentUser.id).reverse().toArray();

            if (filter !== 'todos') {
                txs = txs.filter(t => t.tipo === filter);
            }

            const tbody = document.getElementById('tx-table-body');
            tbody.innerHTML = '';

            if (txs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-slate-500">No se encontraron movimientos registrados en esta cuenta.</td></tr>`;
                return;
            }

            txs.forEach(t => {
                const dateStr = new Date(t.fecha).toLocaleDateString('es-VE', {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit'});
                const formatSymbol = t.moneda === 'USD' ? '$' : 'Bs ';
                const fontColor = t.tipo === 'ingreso' ? 'text-emerald-400' : 'text-rose-400';
                const labelBg = t.tipo === 'ingreso' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400';

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800/40 transition";
                tr.innerHTML = `
                    <td class="py-4.5 pr-2">
                        <p class="font-medium text-slate-200">${t.descripcion}</p>
                        <span class="text-xs text-slate-500">${dateStr}</span>
                    </td>
                    <td class="py-4.5">
                        <span class="px-2.5 py-1 text-xs rounded-full font-bold uppercase tracking-wider ${labelBg}">${t.tipo}</span>
                    </td>
                    <td class="py-4.5 text-right font-bold ${fontColor}">
                        ${t.tipo === 'ingreso' ? '+' : '-'}${formatSymbol}${t.monto.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                    </td>
                    <td class="py-4.5 text-center">
                        <button onclick="deleteTransaction(${t.id})" class="text-slate-500 hover:text-rose-400 p-1.5 rounded-lg hover:bg-rose-500/10 transition" title="Borrar registro">
                            <i data-lucide="trash" class="w-4 h-4"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function renderCompras() {
            const list = document.getElementById('purchases-list');
            list.innerHTML = '';

            const purchases = await db.compras.where('userId').equals(currentUser.id).reverse().toArray();

            if (purchases.length === 0) {
                list.innerHTML = `<div class="bg-slate-900 border border-slate-800 rounded-xl p-8 text-center text-slate-500">Ningún plan de financiamiento registrado.</div>`;
                return;
            }

            purchases.forEach(p => {
                const totalPaid = p.installments.reduce((sum, inst) => sum + inst.paidAmount, 0);
                const remainingGlobal = (p.total - p.downpayment) - totalPaid;
                const progressPct = Math.round((totalPaid / (p.total - p.downpayment)) * 100) || 0;

                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-700/60 rounded-xl p-5 space-y-4 shadow-sm";
                
                let installmentRows = '';
                p.installments.forEach((inst, idx) => {
                    const dueStr = new Date(inst.dueDate).toLocaleDateString('es-VE', {day: '2-digit', month: '2-digit'});
                    const isPaid = inst.status === 'pagado';
                    const remainingInst = inst.amount - inst.paidAmount;

                    installmentRows += `
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between p-3 rounded-lg ${isPaid ? 'bg-slate-800/20 border border-emerald-950/40 text-slate-500' : 'bg-slate-800/60 border border-slate-700/40'} text-xs">
                            <div class="space-y-1">
                                <span class="font-bold text-slate-300">Cuota ${inst.installmentNumber} / ${p.totalInstallments}</span>
                                <div class="flex items-center gap-2">
                                    <span class="text-slate-500">Vence: ${dueStr}</span>
                                    <span class="px-1.5 py-0.5 rounded ${isPaid ? 'bg-emerald-950 text-emerald-400' : 'bg-amber-950 text-amber-400'} font-semibold uppercase tracking-wider text-[10px]">
                                        ${isPaid ? 'Pagado' : 'Pendiente'}
                                    </span>
                                </div>
                            </div>
                            <div class="flex items-center gap-4 mt-2 sm:mt-0 justify-between sm:justify-end">
                                <div class="text-right">
                                    <p class="font-bold text-slate-200">$${inst.amount.toFixed(2)}</p>
                                    ${!isPaid && inst.paidAmount > 0 ? `<p class="text-[10px] text-emerald-400 font-semibold">Abonado: $${inst.paidAmount.toFixed(2)}</p>` : ''}
                                </div>
                                ${!isPaid ? `
                                    <button onclick="openPaymentModal('cashea', ${p.id}, ${idx}, ${remainingInst}, '${p.item} - Cuota ${inst.installmentNumber}')" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-lg transition text-[11px]">
                                        Abonar
                                    </button>
                                ` : `
                                    <span class="text-emerald-400 p-1 bg-emerald-500/10 rounded-full"><i data-lucide="check" class="w-4 h-4"></i></span>
                                `}
                            </div>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 border-b border-slate-800 pb-3">
                        <div>
                            <h5 class="font-bold text-slate-100 flex items-center gap-2">${p.item}</h5>
                            <p class="text-xs text-slate-400">Total: $${p.total.toFixed(2)} | Inicial: $${p.downpayment.toFixed(2)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-slate-400">Deuda Restante</p>
                            <span class="font-bold text-amber-400">$${remainingGlobal.toFixed(2)}</span>
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-slate-400">Progreso de Pago</span>
                            <span class="font-semibold text-slate-200">${progressPct}%</span>
                        </div>
                        <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                            <div class="bg-indigo-500 h-full rounded-full transition-all duration-300" style="width: ${progressPct}%"></div>
                        </div>
                    </div>

                    <div class="space-y-2 mt-4">
                        <p class="text-xs font-semibold tracking-wider uppercase text-slate-400">Cuotas Quincenales</p>
                        ${installmentRows}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function renderDeudas() {
            const list = document.getElementById('debts-list');
            list.innerHTML = '';

            const debts = await db.deudas.where('userId').equals(currentUser.id).reverse().toArray();

            if (debts.length === 0) {
                list.innerHTML = `<div class="bg-slate-900 border border-slate-800 rounded-xl p-8 text-center text-slate-500">No hay deudas activas registradas en esta cuenta.</div>`;
                return;
            }

            debts.forEach(d => {
                const isPaid = d.status === 'pagado';
                const isPorCobrar = d.tipo === 'cobrar';
                const typeLabel = isPorCobrar ? 'POR COBRAR (Cliente)' : 'POR PAGAR (Proveedor)';
                const badgeClass = isPorCobrar ? 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/20' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20';

                const card = document.createElement('div');
                card.className = `bg-slate-900 border ${isPaid ? 'border-slate-800 opacity-60' : 'border-slate-700'} rounded-xl p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shadow-sm`;

                card.innerHTML = `
                    <div class="space-y-1">
                        <span class="px-2 py-0.5 text-[10px] rounded font-bold uppercase tracking-wider ${badgeClass}">
                            ${typeLabel}
                        </span>
                        <h5 class="font-bold text-slate-100 text-base pt-1">${d.concepto}</h5>
                        <p class="text-xs text-slate-400">Persona involucrada: <span class="text-slate-200 font-semibold">${d.persona}</span></p>
                        <p class="text-xs text-slate-500">Monto total registrado: $${d.montoTotal.toFixed(2)}</p>
                    </div>
                    <div class="flex items-center gap-4 justify-between sm:justify-end border-t border-slate-800 sm:border-0 pt-3 sm:pt-0">
                        <div class="text-left sm:text-right">
                            <p class="text-xs text-slate-500">Saldo Pendiente</p>
                            <p class="font-bold text-lg text-amber-400">$${d.montoPendiente.toFixed(2)}</p>
                            ${isPaid ? `<span class="text-xs text-emerald-400 font-bold uppercase tracking-wider">Totalmente solventado</span>` : ''}
                        </div>
                        <div class="flex items-center gap-2">
                            ${!isPaid ? `
                                <button onclick="openPaymentModal('deuda', ${d.id}, 0, ${d.montoPendiente}, '${d.concepto} (${d.persona})')" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold rounded-lg transition">
                                    Abonar
                                </button>
                            ` : ''}
                            <button onclick="deleteDebt(${d.id})" class="p-2 hover:bg-rose-500/10 text-slate-500 hover:text-rose-400 rounded-lg transition" title="Eliminar registro">
                                <i data-lucide="trash" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function renderAdminPanel() {
            if (currentUser.role !== 'admin') return;

            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '';

            const users = await db.usuarios.toArray();
            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-800 hover:bg-slate-800/40 transition";
                tr.innerHTML = `
                    <td class="py-4.5 font-medium text-slate-200">${u.username}</td>
                    <td class="py-4.5">
                        <span class="px-2.5 py-1 text-xs rounded-full font-bold uppercase tracking-wider ${u.role === 'admin' ? 'bg-indigo-500/10 text-indigo-400' : 'bg-slate-700 text-slate-300'}">${u.role}</span>
                    </td>
                    <td class="py-4.5 text-right">
                        ${u.username !== 'admin' ? `
                            <button onclick="deleteUser(${u.id})" class="text-slate-500 hover:text-rose-400 p-1.5 rounded-lg hover:bg-rose-500/10 transition" title="Borrar usuario">
                                <i data-lucide="user-x" class="w-4 h-4"></i>
                            </button>
                        ` : '<span class="text-xs text-slate-500 italic pr-2">Protegido</span>'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- 9. ELIMINACIÓN DE REGISTROS ---
        async function deleteTransaction(id) {
            if (confirm("¿Estás seguro de que deseas eliminar este registro del historial? Esta acción alterará el cálculo del flujo de caja disponible.")) {
                await db.transacciones.delete(id);
                await updateBalancesAndDashboards();
            }
        }

        async function deleteDebt(id) {
            if (confirm("¿Seguro que deseas eliminar esta cuenta del sistema?")) {
                await db.deudas.delete(id);
                await updateBalancesAndDashboards();
            }
        }

        async function deleteUser(id) {
            if (confirm("¿Estás seguro de que deseas revocar los accesos de este usuario?")) {
                await db.usuarios.delete(id);
                await renderAdminPanel();
                lucide.createIcons();
            }
        }

        // --- 10. GESTIÓN DE MODAL DE PAGO ---
        function openPaymentModal(type, targetId, installmentIdx, maxAmount, subtitleText) {
            document.getElementById('modal-target-type').value = type;
            document.getElementById('modal-target-id').value = targetId;
            document.getElementById('modal-installment-idx').value = installmentIdx;
            document.getElementById('modal-max-amount').innerText = `$${maxAmount.toFixed(2)}`;
            document.getElementById('modal-concept-subtitle').innerText = subtitleText;
            
            const payAmountInput = document.getElementById('modal-pay-amount');
            payAmountInput.value = maxAmount.toFixed(2);
            payAmountInput.max = maxAmount;

            document.getElementById('payment-modal').classList.remove('hidden');
            document.getElementById('modal-pay-method').value = 'USD';
            document.getElementById('modal-conversion-notice').classList.add('hidden');
        }

        function closePaymentModal() {
            document.getElementById('payment-modal').classList.add('hidden');
            document.getElementById('modal-payment-form').reset();
        }

        // --- 11. RESPALDO Y RESTAURACIÓN DE SEGURIDAD ---
        async function exportData() {
            try {
                const txs = await db.transacciones.where('userId').equals(currentUser.id).toArray();
                const compras = await db.compras.where('userId').equals(currentUser.id).toArray();
                const deudas = await db.deudas.where('userId').equals(currentUser.id).toArray();

                const backup = {
                    metadata: {
                        exportDate: Date.now(),
                        user: currentUser.username
                    },
                    transacciones: txs,
                    compras,
                    deudas
                };

                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup, null, 2));
                const dlAnchor = document.createElement('a');
                dlAnchor.setAttribute("href", dataStr);
                dlAnchor.setAttribute("download", `InterFinanzas_Backup_${currentUser.username}.json`);
                document.body.appendChild(dlAnchor);
                dlAnchor.click();
                dlAnchor.remove();
            } catch (err) {
                alert("Error al exportar los datos de seguridad: " + err.message);
            }
        }

        // --- 12. HERRAMIENTAS ADMINISTRATIVAS ---
        async function dangerWipeDatabase() {
            if (confirm("ADVERTENCIA CRÍTICA: Se borrarán permanentemente todas las transacciones, deudas, usuarios de esta instalación, restableciendo el aplicativo al estado de fábrica. ¿Deseas continuar?")) {
                const p = prompt("Por favor escribe la palabra 'BORRAR' para confirmar la acción:");
                if (p === 'BORRAR') {
                    await db.delete();
                    localStorage.clear();
                    alert("Base de datos local IndexedDB eliminada con éxito. Recargando la aplicación...");
                    window.location.reload();
                }
            }
        }
    </script>
